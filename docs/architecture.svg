<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" font-family="monospace">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#16324f" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowdim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1600" height="1000" fill="#0b1930"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect x="14" y="14" width="1572" height="972" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <rect x="22" y="22" width="1556" height="956" fill="none" stroke="#1e4060" stroke-width="1"/>

  <text x="60" y="72" fill="#e2f3ff" font-size="34" letter-spacing="6">FORGEOS — SYSTEM ARCHITECTURE</text>
  <text x="60" y="104" fill="#7dd3fc" font-size="16" letter-spacing="3">AI-POWERED PRODUCT PLANNING AND PROTOTYPING AGENT · BLUEPRINT REV. 001</text>
  <line x1="60" y1="122" x2="1540" y2="122" stroke="#1e4060" stroke-width="1"/>

  <!-- USER -->
  <rect x="60" y="200" width="220" height="110" fill="#0e2038" stroke="#7dd3fc" stroke-width="2"/>
  <text x="170" y="245" fill="#e2f3ff" font-size="20" text-anchor="middle" letter-spacing="2">USER</text>
  <text x="170" y="275" fill="#93b8d8" font-size="14" text-anchor="middle">Browser (desktop / mobile)</text>

  <!-- VERCEL FRONTEND -->
  <rect x="380" y="170" width="300" height="170" fill="#0e2038" stroke="#7dd3fc" stroke-width="2"/>
  <text x="530" y="205" fill="#e2f3ff" font-size="20" text-anchor="middle" letter-spacing="2">FRONTEND · VERCEL</text>
  <text x="530" y="233" fill="#93b8d8" font-size="14" text-anchor="middle">Next.js 15 · TypeScript · Tailwind</text>
  <text x="530" y="257" fill="#93b8d8" font-size="14" text-anchor="middle">Live blueprint dashboard</text>
  <text x="530" y="281" fill="#93b8d8" font-size="14" text-anchor="middle">Event replay + reconnect</text>
  <text x="530" y="317" fill="#5a7a99" font-size="12" text-anchor="middle">/privacy · /terms · demo-mode badge</text>

  <!-- RENDER BACKEND -->
  <rect x="380" y="430" width="640" height="420" fill="#0e2038" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="700" y="466" fill="#e2f3ff" font-size="20" text-anchor="middle" letter-spacing="2">BACKEND · RENDER — FASTAPI (PYTHON)</text>

  <rect x="410" y="490" width="270" height="90" fill="#0b1930" stroke="#facc15" stroke-width="1.5"/>
  <text x="545" y="524" fill="#fde68a" font-size="15" text-anchor="middle">DEMO PROTECTION</text>
  <text x="545" y="547" fill="#93b8d8" font-size="12" text-anchor="middle">Per-IP + global rate limits</text>
  <text x="545" y="565" fill="#93b8d8" font-size="12" text-anchor="middle">Input validation (3–2000 chars)</text>

  <rect x="720" y="490" width="270" height="90" fill="#0b1930" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="855" y="524" fill="#e2f3ff" font-size="15" text-anchor="middle">COMPANY ORCHESTRATOR</text>
  <text x="855" y="547" fill="#93b8d8" font-size="12" text-anchor="middle">Task DAG · role assignment</text>
  <text x="855" y="565" fill="#93b8d8" font-size="12" text-anchor="middle">Ordered event timeline</text>

  <rect x="410" y="610" width="580" height="130" fill="#0b1930" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="700" y="642" fill="#e2f3ff" font-size="15" text-anchor="middle" letter-spacing="2">AGENT SOCIETY — 7 AI EMPLOYEES</text>
  <g font-size="13" fill="#93b8d8" text-anchor="middle">
    <text x="480" y="675">CEO</text>
    <text x="480" y="695">plan</text>
    <text x="570" y="675">PM</text>
    <text x="570" y="695">tasks</text>
    <text x="660" y="675">ENGINEER</text>
    <text x="660" y="695">code</text>
    <text x="760" y="675">QA</text>
    <text x="760" y="695">tests</text>
    <text x="845" y="675">SECURITY</text>
    <text x="845" y="695">audit</text>
    <text x="930" y="675">REVIEWER · DEVOPS</text>
    <text x="930" y="695">approve · ship</text>
  </g>
  <text x="700" y="726" fill="#5a7a99" font-size="12" text-anchor="middle">dialogue · handoffs · reviews · conflict resolution over shared message bus</text>

  <rect x="410" y="765" width="580" height="60" fill="#0b1930" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="700" y="790" fill="#94a3b8" font-size="14" text-anchor="middle">DETERMINISTIC FALLBACK — templates complete every run if the LLM is unavailable</text>
  <text x="700" y="810" fill="#5a7a99" font-size="12" text-anchor="middle">result labeled "Demo mode" in the UI · no broken pages</text>

  <!-- QWEN CLOUD -->
  <rect x="1180" y="430" width="360" height="230" fill="#0e2038" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="1360" y="470" fill="#ede9fe" font-size="20" text-anchor="middle" letter-spacing="2">ALIBABA CLOUD</text>
  <text x="1360" y="498" fill="#c4b5fd" font-size="16" text-anchor="middle">Qwen Cloud · Model Studio</text>
  <line x1="1210" y1="516" x2="1510" y2="516" stroke="#3b3560" stroke-width="1"/>
  <text x="1360" y="548" fill="#e2f3ff" font-size="15" text-anchor="middle">qwen-plus</text>
  <text x="1360" y="574" fill="#93b8d8" font-size="13" text-anchor="middle">DashScope OpenAI-compatible API</text>
  <text x="1360" y="596" fill="#93b8d8" font-size="13" text-anchor="middle">dashscope-intl.aliyuncs.com</text>
  <text x="1360" y="630" fill="#5a7a99" font-size="12" text-anchor="middle">plans · agent dialogue · reviews · code generation</text>

  <!-- UPTIMEROBOT -->
  <rect x="60" y="620" width="220" height="90" fill="#0e2038" stroke="#475569" stroke-width="1.5"/>
  <text x="170" y="655" fill="#cbd5e1" font-size="15" text-anchor="middle">UPTIMEROBOT</text>
  <text x="170" y="678" fill="#93b8d8" font-size="12" text-anchor="middle">pings GET /health · 5 min</text>
  <text x="170" y="696" fill="#5a7a99" font-size="12" text-anchor="middle">keeps free instance awake</text>

  <!-- ARROWS -->
  <line x1="280" y1="255" x2="374" y2="255" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="327" y="243" fill="#7dd3fc" font-size="12" text-anchor="middle">HTTPS</text>

  <line x1="500" y1="340" x2="500" y2="424" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="493" y="385" fill="#7dd3fc" font-size="12" text-anchor="end">WS /company/stream</text>
  <text x="493" y="403" fill="#5a7a99" font-size="11" text-anchor="end">live events + reconnect</text>

  <line x1="600" y1="340" x2="600" y2="424" stroke="#475569" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowdim)"/>
  <text x="608" y="385" fill="#94a3b8" font-size="12">POST /company/launch</text>
  <text x="608" y="403" fill="#5a7a99" font-size="11">REST fallback</text>

  <line x1="1020" y1="535" x2="1174" y2="535" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="1097" y="521" fill="#c4b5fd" font-size="12" text-anchor="middle">HTTPS · Bearer auth</text>
  <text x="1097" y="557" fill="#5a7a99" font-size="11" text-anchor="middle">key server-side only</text>

  <line x1="280" y1="660" x2="374" y2="660" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrowdim)"/>

  <!-- LEGEND -->
  <line x1="60" y1="900" x2="1540" y2="900" stroke="#1e4060" stroke-width="1"/>
  <g font-size="13">
    <line x1="60" y1="936" x2="110" y2="936" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="122" y="941" fill="#93b8d8">primary path</text>
    <line x1="280" y1="936" x2="330" y2="936" stroke="#475569" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowdim)"/>
    <text x="342" y="941" fill="#93b8d8">fallback / support path</text>
    <rect x="560" y="926" width="16" height="16" fill="none" stroke="#facc15" stroke-width="1.5"/>
    <text x="588" y="941" fill="#93b8d8">abuse protection</text>
    <rect x="780" y="926" width="16" height="16" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="808" y="941" fill="#93b8d8">Alibaba Cloud service</text>
    <text x="1540" y="941" fill="#5a7a99" text-anchor="end">no database · no stored user data · secrets in env vars only</text>
  </g>
</svg>
